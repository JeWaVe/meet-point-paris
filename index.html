      <div style="max-width: 600px; margin: 40px auto; padding: 20px; font-family: system-ui, sans-serif;">
        <h1>WhereToMeet — Find the ideal meeting point using public transit</h1>
        <p>WhereToMeet finds the optimal meeting point using public transit in your city. Available in French, English, German, Italian, and Spanish.</p>
        <h2>How it works</h2>
        <ol>
          <li>Choose your city: Paris, Toulouse, Marseille, London, or New York</li>
          <li>Add 2 or more departure addresses (search or click on the map)</li>
          <li>Toggle bike mode for each participant if needed</li>
          <li>Click "Find meeting point"</li>
          <li>Discover the optimal location with nearby restaurants, cafés, and bars</li>
        </ol>
        <h2>Covered networks</h2>
        <p><strong>Paris:</strong> Metro (lines 1–14, 3bis, 7bis), RER (A–E), Tram (T1–T13) — 750+ stations.</p>
        <p><strong>Toulouse:</strong> Metro (A, B), Tram (T1), Cable car (Téléo) — 66 stations.</p>
        <p><strong>Marseille:</strong> Metro (M1, M2), Tram (T1, T2, T3) — 68 stations.</p>
        <p><strong>London:</strong> Underground (Tube) — 11 lines, 266 stations.</p>
        <p><strong>New York:</strong> Subway — 23 lines, 424 stations.</p>
        <p>Real travel times from official GTFS data.</p>
        <p><strong>JavaScript is required to use this application.</strong></p>
      </div>
