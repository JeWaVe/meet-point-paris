        <h1>WhereToMeet — Trouvez le lieu de rendez-vous idéal en transports en commun</h1>
        <p>WhereToMeet calcule le point de rencontre optimal en transports en commun dans votre ville.</p>
        <h2>Comment ça marche ?</h2>
        <ol>
          <li>Choisissez votre ville : Paris, Toulouse ou Marseille</li>
          <li>Ajoutez 2 adresses de départ ou plus (recherche ou clic sur la carte)</li>
          <li>Activez le mode vélo pour chaque participant si besoin</li>
          <li>Cliquez sur « Calculer le point de rencontre »</li>
          <li>Découvrez le lieu optimal avec les restaurants, cafés et bars à proximité</li>
        </ol>
        <h2>Réseaux couverts</h2>
        <p><strong>Paris :</strong> Métro (lignes 1–14, 3bis, 7bis), RER (A–E), Tramway (T1–T13) — 750+ stations.</p>
        <p><strong>Toulouse :</strong> Métro (A, B), Tramway (T1), Téléphérique (Téléo) — 66 stations.</p>
        <p><strong>Marseille :</strong> Métro (M1, M2), Tramway (T1, T2, T3) — 68 stations.</p>
        <p>Temps de trajet réels issus des données GTFS officielles.</p>
        <p><strong>JavaScript est requis pour utiliser cette application.</strong></p>
