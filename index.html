        <h1>WhereToMeet — Trouvez le lieu de rendez-vous idéal à Paris</h1>
        <p>WhereToMeet calcule le point de rencontre optimal en transports en commun à Paris.</p>
        <h2>Comment ça marche ?</h2>
        <ol>
          <li>Ajoutez 2 adresses de départ ou plus (recherche ou clic sur la carte)</li>
          <li>Activez le mode vélo pour chaque participant si besoin</li>
          <li>Cliquez sur « Calculer le point de rencontre »</li>
          <li>Découvrez le lieu optimal avec les restaurants, cafés et bars à proximité</li>
        </ol>
        <h2>Réseau couvert</h2>
        <p>Métro (lignes 1–14, 3bis, 7bis), RER (A–E), Tramway (T1–T13), vélo et marche à pied.</p>
        <p>Plus de 750 stations avec des temps de trajet réels issus des données GTFS d'Île-de-France Mobilités.</p>
