<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <rect width="1200" height="630" fill="#1e293b"/>
  <!-- Map grid lines -->
  <g stroke="#334155" stroke-width="1" opacity="0.5">
    <line x1="0" y1="105" x2="1200" y2="105"/>
    <line x1="0" y1="210" x2="1200" y2="210"/>
    <line x1="0" y1="315" x2="1200" y2="315"/>
    <line x1="0" y1="420" x2="1200" y2="420"/>
    <line x1="0" y1="525" x2="1200" y2="525"/>
    <line x1="200" y1="0" x2="200" y2="630"/>
    <line x1="400" y1="0" x2="400" y2="630"/>
    <line x1="600" y1="0" x2="600" y2="630"/>
    <line x1="800" y1="0" x2="800" y2="630"/>
    <line x1="1000" y1="0" x2="1000" y2="630"/>
  </g>
  <!-- Heatmap blobs -->
  <circle cx="600" cy="315" r="200" fill="#10b981" opacity="0.15"/>
  <circle cx="600" cy="315" r="130" fill="#10b981" opacity="0.2"/>
  <circle cx="600" cy="315" r="60" fill="#10b981" opacity="0.3"/>
  <!-- Transit lines -->
  <line x1="150" y1="200" x2="1050" y2="450" stroke="#FFCD00" stroke-width="3" opacity="0.4"/>
  <line x1="300" y1="100" x2="900" y2="530" stroke="#0064B0" stroke-width="3" opacity="0.4"/>
  <line x1="100" y1="400" x2="1100" y2="250" stroke="#CF5DAD" stroke-width="3" opacity="0.4"/>
  <!-- User points -->
  <circle cx="350" cy="220" r="18" fill="#6366f1" stroke="white" stroke-width="3"/>
  <circle cx="350" cy="220" r="5" fill="white"/>
  <circle cx="850" cy="430" r="18" fill="#6366f1" stroke="white" stroke-width="3"/>
  <circle cx="850" cy="430" r="5" fill="white"/>
  <circle cx="480" cy="450" r="18" fill="#6366f1" stroke="white" stroke-width="3"/>
  <circle cx="480" cy="450" r="5" fill="white"/>
  <!-- Optimal point -->
  <circle cx="600" cy="315" r="24" fill="#10b981" stroke="white" stroke-width="3"/>
  <text x="600" y="323" text-anchor="middle" font-size="20" fill="white">&#9733;</text>
  <!-- Title -->
  <text x="600" y="80" text-anchor="middle" font-family="system-ui, sans-serif" font-size="48" font-weight="bold" fill="white">
    <tspan>&#x1F4CD;</tspan> WhereToMeet
  </text>
  <text x="600" y="580" text-anchor="middle" font-family="system-ui, sans-serif" font-size="24" fill="#94a3b8">
    Find the ideal meeting point using public transit
  </text>
</svg>
