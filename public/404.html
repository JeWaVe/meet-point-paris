<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>WhereToMeet</title>
    <script>
      // GitHub Pages SPA redirect: preserve path and hash for client-side routing
      var path = window.location.pathname + window.location.search + window.location.hash;
      window.location.replace('/' + '?redirect=' + encodeURIComponent(path));
    </script>
  </head>
  <body></body>
</html>
